user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logger
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens off;

  # Sıkıştırma
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css application/json application/javascript
    application/xml+rss text/javascript application/x-font-ttf
    font/opentype image/svg+xml;

  # Genel rate limit (DDOS dampener)
  limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  upstream backend_upstream {
    server backend:3000;
    keepalive 32;
  }

  upstream frontend_upstream {
    server frontend:3001;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    # Auth endpoint'lerine sıkı limit (brute-force engeli)
    location ~ ^/api/auth/(login|register) {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SSE bildirim akışı: tampon kapalı, uzun timeout
    location /api/notifications/stream {
      proxy_pass         http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection '';
      proxy_buffering    off;
      proxy_cache        off;
      proxy_read_timeout 24h;
      chunked_transfer_encoding off;
    }

    # Diğer API çağrıları
    location /api/ {
      limit_req zone=general burst=60 nodelay;
      proxy_pass         http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Frontend (Next.js) — tüm diğer yollar
    location / {
      proxy_pass         http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }
  }
}
